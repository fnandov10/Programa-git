          <label for="uNombre">Nombre completo</label>
          <input type="text" id="uNombre" required placeholder="Ej: Ana Gómez">
        </div>
        <div class="form-group">
          <label for="uCorreo">Correo electrónico</label>

          <div class="form-group">
            <label for="uRol">Rol</label>

              <option>Supervisor</option>
              <option>Auxiliar</option>
            </select>
          </div>
          <div class="form-group">
            <label for="uEstado">Estado</label>
            <select id="uEstado" required>
              <option>Activo</option>
              <option>Inactivo</option>
            </select>
          </div>
        </div>

          <button type="button" class="btn btn-ghost" onclick="cerrarModalUsuario()">Cancelar</button>
